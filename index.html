<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Non-Profit Org</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header id="main-header"></header>

    <main class="content-area">
        
        <section class="greeting-section">
            <img id="profile-img" src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>' alt="Profile" class="profile-img" onclick="window.location.href='profile.html'">
            <div class="greeting-text">
                <h2 id="greeting-text" class="skeleton-text">Good Morning, Loading...</h2>
                <p id="greeting-date" class="skeleton-text">Day, Date</p>
            </div>
        </section>

        <section class="kpi-card">
            <div class="kpi-title">Active Members</div>
            <div id="kpi-value" class="kpi-value skeleton-text">000</div>
        </section>

        <section id="action-grid" class="action-grid">
            <div class="action-card skeleton-text" style="background: #e0e0e0;"></div>
            <div class="action-card skeleton-text" style="background: #e0e0e0;"></div>
        </section>

        <h3 class="section-title">Event Highlights</h3>
        <div class="carousel-container">
            <div class="carousel-track">
                <img src="https://res.cloudinary.com/demo/image/upload/v1652343162/cld-sample.jpg" class="carousel-slide" loading="lazy">
                <img src="https://res.cloudinary.com/demo/image/upload/v1652343163/cld-sample-2.jpg" class="carousel-slide" loading="lazy">
            </div>
        </div>

        <h3 class="section-title">Upcoming Events</h3>
        <div class="events-list">
            <div class="event-card">
                <img src="https://res.cloudinary.com/demo/image/upload/w_200,h_200,c_fill/v1652343164/cld-sample-3.jpg" class="event-img" loading="lazy">
                <div class="event-info">
                    <h4>Community Clean-up</h4>
                    <p><span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">calendar_today</span> Apr 15, 2026</p>
                    <p><span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">location_on</span> Caloocan City Plaza</p>
                </div>
            </div>
        </div>

    </main>

    <footer id="main-footer"></footer>

    <script src="supabaseClient.js"></script>
    <script src="app.js"></script>
</body>
</html>
