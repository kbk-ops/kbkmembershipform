<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../../Kasangga New Logo Small.png" type="image/x-icon">
  <link rel="stylesheet" href="attendance.css">
  <link rel="stylesheet" href="topbottom.css">

  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

  <div class="container">
    <header class="header">
      <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <h1 class="neon-title">Attendance</h1>
    </header>

    <form id="attendance-form" class="glass-panel">

      <div class="input-group">
        <label for="id_number">ID Number</label>
        <div class="input-with-btn">
          <input type="text" id="id_number" name="id_number" placeholder="Enter ID or Scan QR" required autocomplete="off">
          <button type="button" id="btn-scan" class="icon-btn" aria-label="Scan QR Code">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" readonly placeholder="Auto-filled Name">
      </div>

      <div class="input-group">
        <label for="gender">Gender</label>
        <input type="text" id="gender" name="gender" readonly placeholder="Auto-filled Gender">
      </div>

      <div class="input-group">
        <label for="barangay">Barangay</label>
        <input type="text" id="barangay" name="barangay" readonly placeholder="Auto-filled Barangay">
      </div>

      <div class="input-group">
        <label for="district">District</label>
        <input type="text" id="district" name="district" readonly placeholder="Auto-filled District">
      </div>

      <div class="input-group">
        <label for="position">Position</label>
        <input type="text" id="position" name="position" readonly placeholder="Auto-filled Position">
      </div>

      <div class="button-group">
        <button type="submit" id="btn-submit" class="btn btn-submit">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Reset
        </button>
      </div>
    </form>
  </div>

  <div id="qr-modal" class="modal hidden">
    <div class="modal-content glass-panel">
      <h3 class="neon-title" style="font-size: 1.2rem; margin-bottom: 10px;">Scan QR Code</h3>
      <div class="video-container">
        <video id="video" width="100%" height="100%"></video>
        <div class="scanner-guide"></div>
      </div>
      <button type="button" id="btn-close-scan" class="btn btn-reset" style="margin-top: 15px; width: 100%;">Cancel</button>
    </div>
  </div>

  <div id="loading-overlay" class="overlay hidden">
    <div class="spinner"></div>
    <p class="neon-title" style="margin-top: 15px; font-size: 1rem;">Sending Data...</p>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="supabaseClient.js"></script>
  <script src="authGuard.js"></script>
  <script src="components.js"></script>
  <script src="attendance.js"></script>
</body>

</html>
