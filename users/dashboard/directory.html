<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Member Directory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../../Kasangga New Logo Small.png" type="image/x-icon">
  <link rel="stylesheet" href="directory.css">
  <link rel="stylesheet" href="topbottom.css">

  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="bg-animated">
    <div class="blob blob-violet"></div>
    <div class="blob blob-green"></div>
  </div>

  <div class="app-container">
    <div class="search-container">
      <div class="input-group">
        <input type="text" id="searchInput" placeholder=" " autocomplete="off">
        <label for="searchInput">Search by ID, First or Last Name</label>
        <button class="search-icon" id="searchBtn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </div><br>

    <main>
      <div id="listContainer" class="member-grid"></div>

      <div id="emptyState" class="empty-state hidden glass-panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <p>No members found matching your search.</p>
      </div>

      <div id="paginationContainer" class="pagination hidden glass-panel"></div>
    </main>

    <div id="detailsModal" class="modal hidden">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <button id="closeModal" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <button id="editBtn" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </button>
          <button id="saveBtn" class="icon-btn action-btn hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            Save
          </button>
        </div>

        <div class="modal-body" id="detailsForm">
          <div class="profile-header">
            <div id="detailAvatar" class="detail-avatar"></div>
            <strong id="detailIdNumber" class="id-number"></strong>
          </div>

          <div class="form-grid">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="authGuard.js"></script>
  <script src="components.js"></script>
  <script src="directory.js"></script>
</body>

</html>
