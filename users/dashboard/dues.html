<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Dues</title>
  <link rel="icon" href="../../Kasangga New Logo Small.png" type="image/x-icon">

  <link rel="stylesheet" href="dues.css">
  <link rel="stylesheet" href="topbottom.css">

  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>
  <div class="bg-animated"></div>

  <main class="container">
    <form id="duesForm" class="glass-panel">
      <h2 class="form-title">Monthly Dues</h2>

      <div class="form-group">
        <label for="id_number">ID Number</label>
        <div class="input-with-action">
          <input type="text" id="id_number" name="id_number" placeholder="ID No." required />

          <button type="button" id="btnScan" class="scan-trigger"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

              <rect x="3" y="3" width="6" height="6" rx="1" />
              <rect x="15" y="3" width="6" height="6" rx="1" />
              <rect x="3" y="15" width="6" height="6" rx="1" />

              <rect x="5" y="5" width="2" height="2" />
              <rect x="17" y="5" width="2" height="2" />
              <rect x="5" y="17" width="2" height="2" />

              <path d="M11 5h2" />
              <path d="M11 9h4" />
              <path d="M9 13h2" />
              <path d="M13 13h2" />
              <path d="M11 17h4" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="full_name">Name</label>
        <input type="text" id="full_name" name="full_name" readonly placeholder="..." />
      </div>

      <div class="form-group">
        <label for="barangay">Barangay</label>
        <input type="text" id="barangay" name="barangay" readonly placeholder="..." />
      </div>

      <div class="form-group">
        <label for="district">District</label>
        <input type="text" id="district" name="district" readonly placeholder="..." />
      </div>

      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="text" id="amount" name="amount" readonly value="Php 30.00" />
      </div>

      <div class="form-group">
        <label for="year">Year</label>
        <select id="year" name="year" required>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>
      </div>

      <div class="form-group">
        <label for="month">Month</label>
        <select id="month" name="month" required>
          <option value="" disabled selected>Select...</option>
          <option value="January">January</option>
          <option value="February">February</option>
          <option value="March">March</option>
          <option value="April">April</option>
          <option value="May">May</option>
          <option value="June">June</option>
          <option value="July">July</option>
          <option value="August">August</option>
          <option value="September">September</option>
          <option value="October">October</option>
          <option value="November">November</option>
          <option value="December">December</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" id="btnClear" class="btn-clear"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
          </svg>
          Clear
        </button>

        <button type="submit" id="btnSubmit" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13" />
            <path d="M22 2L15 22l-4-9-9-4z" />
          </svg>
          Submit</button>
      </div>
    </form>
  </main>

  <div id="spinnerOverlay" class="overlay hidden">
    <div class="spinner"></div>
    <p>Saving Contribution...</p>
  </div>

  <div id="cameraOverlay" class="overlay hidden">
    <div class="camera-container glass-panel" style="width: 90%; max-width: 400px; text-align: center; padding: 20px;">
      <h3 style="margin-bottom: 15px;">Scan Barcode</h3>

      <div style="position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; aspect-ratio: 1/1;">

        <video id="video" playsinline style="width: 100%; height: 100%; object-fit: cover; display: block;"></video>

        <div style="position: absolute; width: 65%; height: 65%; border: 3px solid #00FF00; border-radius: 12px; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6); box-sizing: border-box; z-index: 10;">
          <div style="position: absolute; top: -3px; left: -3px; width: 20px; height: 20px; border-top: 3px solid #00FF00; border-left: 3px solid #00FF00;"></div>
          <div style="position: absolute; top: -3px; right: -3px; width: 20px; height: 20px; border-top: 3px solid #00FF00; border-right: 3px solid #00FF00;"></div>
          <div style="position: absolute; bottom: -3px; left: -3px; width: 20px; height: 20px; border-bottom: 3px solid #00FF00; border-left: 3px solid #00FF00;"></div>
          <div style="position: absolute; bottom: -3px; right: -3px; width: 20px; height: 20px; border-bottom: 3px solid #00FF00; border-right: 3px solid #00FF00;"></div>
        </div>

      </div>

      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button type="button" id="btnToggleFlash" class="btn-primary" style="flex: 1; display: none; background-color: #333;">🔦 Flash: OFF</button>
        <button type="button" id="btnCloseCamera" class="btn-clear" style="flex: 1;">Close</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="supabaseClient.js"></script>
  <script src="authGuard.js"></script>
  <script src="components.js"></script>
  <script src="dues.js"></script>
</body>

</html>
